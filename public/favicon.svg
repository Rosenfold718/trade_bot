<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="16" x2="32" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="candle-up" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="candle-down" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)" stroke="#1e293b" stroke-width="0.5"/>
  <!-- Candlestick chart -->
  <!-- Green candle 1 (up) -->
  <line x1="6" y1="10" x2="6" y2="20" stroke="#34d399" stroke-width="1" stroke-linecap="round"/>
  <rect x="4.5" y="12" width="3" height="5" rx="0.5" fill="url(#candle-up)"/>
  <!-- Red candle 2 (down) -->
  <line x1="11" y1="8" x2="11" y2="22" stroke="#f87171" stroke-width="1" stroke-linecap="round"/>
  <rect x="9.5" y="10" width="3" height="6" rx="0.5" fill="url(#candle-down)"/>
  <!-- Green candle 3 (up) -->
  <line x1="16" y1="7" x2="16" y2="18" stroke="#34d399" stroke-width="1" stroke-linecap="round"/>
  <rect x="14.5" y="9" width="3" height="5" rx="0.5" fill="url(#candle-up)"/>
  <!-- Red candle 4 (down) -->
  <line x1="21" y1="9" x2="21" y2="24" stroke="#f87171" stroke-width="1" stroke-linecap="round"/>
  <rect x="19.5" y="12" width="3" height="7" rx="0.5" fill="url(#candle-down)"/>
  <!-- Green candle 5 (up, tall) -->
  <line x1="26" y1="6" x2="26" y2="22" stroke="#34d399" stroke-width="1" stroke-linecap="round"/>
  <rect x="24.5" y="7" width="3" height="8" rx="0.5" fill="url(#candle-up)"/>
  <!-- Trend line -->
  <line x1="4" y1="21" x2="28" y2="10" stroke="url(#line)" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="3 2" opacity="0.5"/>
</svg>
